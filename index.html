   <textarea class="note ${s.note?'has':''}" placeholder="Notes (shared)…">${(s.note||"").replace(/</g,"&lt;")}</textarea>`;
  c.querySelector(".star").onclick=()=>{s.star=!s.star;persist();c.classList.toggle("sel",s.star);
    c.querySelector(".star").className="star"+(s.star?" on":"");c.querySelector(".star").textContent=s.star?"★":"☆";updateFoot();
    if($("onlysel").checked)render();};
  const ta=c.querySelector(".note"),nb=c.querySelector(".noteb");
  nb.onclick=()=>{ta.classList.toggle("show");if(ta.classList.contains("show")||ta.value)ta.focus();};
  ta.onfocus=()=>editing=r.key;
  ta.oninput=()=>{s.note=ta.value;persist();};
  ta.onblur=()=>{editing=null;ta.className="note"+(s.note?" has":"");};
  g.appendChild(c);
 });
 $("empty").style.display=rows.length?"none":"block";
 $("showcnt").textContent=`${rows.length} of ${DATA.length}`;updateFoot();
}
function updateFoot(){$("selcnt").textContent=Object.values(state.items).filter(x=>x.star).length;}
function stats(){
 $("upd").innerHTML=`Updated <b>${META.date}</b> · refreshes ~3 days · shortlist <span id="syncbadge"></span>`;
 setSync(SB?true:null);
 if(!META.pg_ok||!META.nn_ok){const w=$("warn");w.style.display="block";
  w.textContent="⚠ Last refresh: "+(!META.pg_ok?"PropertyGuru ":"")+(!META.nn_ok?"99.co ":"")+"was blocked — showing previous data for that source.";}
 $("stats").innerHTML=`<div class="stat"><div class="n">${META.total}</div><div class="l">Listings</div></div>
  <div class="stat nw"><div class="n">${META.new}</div><div class="l">New</div></div>
  <div class="stat go"><div class="n">${META.big}</div><div class="l">1,700+ sf</div></div>
  <div class="stat"><div class="n">${META.both}</div><div class="l">Both sites</div></div>
  <div class="stat"><div class="n">${META.tierA}</div><div class="l">Tier A</div></div>`;
}
function shortlisted(){return DATA.filter(r=>it(r.key).star);}
$("exp").onclick=()=>{const sel=shortlisted();if(!sel.length){alert("Shortlist some first (tap ☆).");return;}
 const h=["Name","Address","Rent","Sqft","Tier","Fit","Type","MRT","Source","Note","Link"];
 const csv=[h.join(",")].concat(sel.map(r=>[r.name,r.addr,r.rent,r.sqft,r.tier,r.score,r.type,r.mrt,r.src,it(r.key).note||"",r.link].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","))).join("\n");
 const b=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="shortlist.csv";a.click();};
$("copy").onclick=()=>{const sel=shortlisted();if(!sel.length){alert("Shortlist some first (tap ☆).");return;}
 const t=sel.map(r=>`• ${r.name}, ${r.addr} — ${r.sqft}sf, $${r.rent}/mo${it(r.key).note?` [${it(r.key).note}]`:''}  ${r.link}`).join("\n");
 navigator.clipboard.writeText(t).then(()=>alert("Copied "+sel.length+" listings."));};
$("ftoggle").onclick=()=>{$("panel").classList.toggle("open");$("ftoggle").classList.toggle("on");};
["q","minsqft","maxrent","ptype","source","tier","pgym","newonly","onlysel","sort"].forEach(i=>{
 const el=$(i);el.addEventListener(el.type==="text"?"input":"change",()=>render());});
$("reset").onclick=()=>{$("q").value="";["minsqft","maxrent","ptype","source","tier"].forEach(i=>$(i).selectedIndex=0);
 ["pgym","newonly","onlysel"].forEach(i=>$(i).checked=false);$("sort").value="fit";render();};

(async()=>{ await loadState(); stats(); render();
 if(SB){setInterval(syncRefresh,20000);window.addEventListener("focus",syncRefresh);} })();
</script>
</body></html>
